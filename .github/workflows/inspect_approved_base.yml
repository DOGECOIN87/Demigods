name: Inspect approved base avatar

on:
  pull_request:
    paths:
      - assets/**
      - prompts/**
      - docs/**
      - config/**
      - scripts/**
      - .github/workflows/inspect_approved_base.yml
      - inspection_trigger.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=repository_snapshot.tar.gz -czf repository_snapshot.tar.gz .
          find assets prompts docs config scripts -type f 2>/dev/null | sort > repository_file_list.txt || true
          du -h repository_snapshot.tar.gz

      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: demigods-repository-snapshot
          path: |
            repository_snapshot.tar.gz
            repository_file_list.txt
          if-no-files-found: error
          retention-days: 1
