name: Inspect approved base avatar

on:
  pull_request:
    paths:
      - assets/base_body/base_body_001_neutral_master.webp
      - .github/workflows/inspect_approved_base.yml
      - inspection_trigger.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Convert approved WebP to production-sized PNG
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from PIL import Image

          source = Path('assets/base_body/base_body_001_neutral_master.webp')
          output_dir = Path('inspection_output')
          output_dir.mkdir(parents=True, exist_ok=True)
          output = output_dir / 'base_body_001_neutral_master.png'

          with Image.open(source) as image:
              rgba = image.convert('RGBA')
              print(f'source_size={rgba.size}')
              print(f'source_mode={rgba.mode}')
              alpha = rgba.getchannel('A')
              print(f'alpha_extrema={alpha.getextrema()}')
              print(f'visible_bbox={alpha.getbbox()}')
              if rgba.size != (2048, 2048):
                  rgba = rgba.resize((2048, 2048), Image.Resampling.LANCZOS)
              rgba.save(output, format='PNG', optimize=True)

          data = output.read_bytes()
          print(f'output_size_bytes={len(data)}')
          print(f'output_sha256={sha256(data).hexdigest()}')
          PY

      - name: Upload inspection PNG
        uses: actions/upload-artifact@v4
        with:
          name: approved-base-inspection
          path: inspection_output/base_body_001_neutral_master.png
          if-no-files-found: error
          retention-days: 1
