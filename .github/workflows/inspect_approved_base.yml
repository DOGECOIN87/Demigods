name: Inspect approved base avatar

on:
  pull_request:
    paths:
      - assets/base_body/base_body_001_neutral_master.webp
      - .github/workflows/inspect_approved_base.yml
      - inspection_trigger.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Inspect and convert approved base
        shell: bash
        run: |
          set +e
          mkdir -p inspection_output
          cp assets/base_body/base_body_001_neutral_master.webp inspection_output/source_base_body_001_neutral_master.webp
          file assets/base_body/base_body_001_neutral_master.webp | tee inspection_output/file_report.txt
          sha256sum assets/base_body/base_body_001_neutral_master.webp | tee inspection_output/source_sha256.txt
          python - <<'PY' > inspection_output/python_report.txt 2>&1
          from hashlib import sha256
          from pathlib import Path
          import traceback
          from PIL import Image, ImageFile

          ImageFile.LOAD_TRUNCATED_IMAGES = True
          source = Path('assets/base_body/base_body_001_neutral_master.webp')
          output = Path('inspection_output/base_body_001_neutral_master.png')

          data = source.read_bytes()
          print(f'source_size_bytes={len(data)}')
          print(f'source_header_hex={data[:32].hex()}')
          print(f'source_sha256={sha256(data).hexdigest()}')

          try:
              with Image.open(source) as image:
                  image.load()
                  rgba = image.convert('RGBA')
                  print(f'source_format={image.format}')
                  print(f'source_size={rgba.size}')
                  print(f'source_mode={rgba.mode}')
                  alpha = rgba.getchannel('A')
                  print(f'alpha_extrema={alpha.getextrema()}')
                  print(f'visible_bbox={alpha.getbbox()}')
                  if rgba.size != (2048, 2048):
                      rgba = rgba.resize((2048, 2048), Image.Resampling.LANCZOS)
                  rgba.save(output, format='PNG', optimize=True)
              converted = output.read_bytes()
              print(f'output_size_bytes={len(converted)}')
              print(f'output_sha256={sha256(converted).hexdigest()}')
          except Exception:
              traceback.print_exc()
          PY
          cat inspection_output/python_report.txt
          exit 0

      - name: Upload inspection files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approved-base-inspection
          path: inspection_output/
          if-no-files-found: error
          retention-days: 1
