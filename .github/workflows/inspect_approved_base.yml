name: Inspect approved base avatar

on:
  pull_request:
    paths:
      - assets/base_body/base_body_001_neutral_master.webp
      - .github/workflows/inspect_approved_base.yml
      - inspection_trigger.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Recover and inspect approved base
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p inspection_output

          history_commit='eb563843197e68ea85433529eb71033c84f91c22'
          git show "${history_commit}:.asset-upload/base_body.part00" > inspection_output/base_body.part00
          git show "${history_commit}:.asset-upload/base_body.part01" > inspection_output/base_body.part01
          cat inspection_output/base_body.part00 inspection_output/base_body.part01 \
            | tr -d '\r\n\t ' \
            | base64 --decode \
            > inspection_output/base_body_001_neutral_master_recovered.png

          cp assets/base_body/base_body_001_neutral_master.webp inspection_output/damaged_repository_reference.webp
          file inspection_output/base_body_001_neutral_master_recovered.png | tee inspection_output/recovered_file_report.txt
          sha256sum inspection_output/base_body_001_neutral_master_recovered.png | tee inspection_output/recovered_sha256.txt
          sha256sum inspection_output/damaged_repository_reference.webp | tee inspection_output/damaged_webp_sha256.txt

          python - <<'PY' | tee inspection_output/python_report.txt
          from hashlib import sha256
          from pathlib import Path
          from PIL import Image

          recovered = Path('inspection_output/base_body_001_neutral_master_recovered.png')
          with Image.open(recovered) as image:
              image.load()
              rgba = image.convert('RGBA')
              alpha = rgba.getchannel('A')
              print(f'format={image.format}')
              print(f'size={rgba.size}')
              print(f'mode={rgba.mode}')
              print(f'alpha_extrema={alpha.getextrema()}')
              print(f'visible_bbox={alpha.getbbox()}')
              print(f'png_sha256={sha256(recovered.read_bytes()).hexdigest()}')
              if rgba.size != (2048, 2048):
                  raise SystemExit(f'Unexpected recovered dimensions: {rgba.size}')
              if 'A' not in rgba.getbands():
                  raise SystemExit('Recovered image is missing alpha')
              if alpha.getextrema() == (255, 255):
                  raise SystemExit('Recovered image is fully opaque')
          PY

      - name: Upload recovered inspection files
        uses: actions/upload-artifact@v4
        with:
          name: approved-base-recovery
          path: inspection_output/
          if-no-files-found: error
          retention-days: 1
