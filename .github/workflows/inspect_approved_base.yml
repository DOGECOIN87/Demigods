name: Inspect approved base avatar

on:
  pull_request:
    paths:
      - assets/**
      - prompts/**
      - docs/**
      - config/**
      - scripts/**
      - .github/workflows/inspect_approved_base.yml
      - inspection_trigger.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf /tmp/repository_snapshot.tar.gz .
          find . -path './.git' -prune -o -type f -print | sort > /tmp/repository_file_list.txt
          du -h /tmp/repository_snapshot.tar.gz

      - name: Upload repository snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demigods-repository-snapshot
          path: |
            /tmp/repository_snapshot.tar.gz
            /tmp/repository_file_list.txt
          if-no-files-found: error
          retention-days: 1
