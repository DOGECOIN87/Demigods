name: Bootstrap repository files

on:
  push:
    paths:
      - ".github/workflows/bootstrap-assets.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and extract repository package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/payload.part.* > /tmp/demigods.tar.gz.b64
          base64 --decode /tmp/demigods.tar.gz.b64 > /tmp/demigods.tar.gz
          tar -xzf /tmp/demigods.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-assets.yml

      - name: Commit extracted project
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add production prompts, documentation, scripts, and reference images"
          git push
